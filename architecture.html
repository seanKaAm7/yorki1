<title>Yorki — Architecture & Flows</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1017;--surf:#131720;--surf2:#1a1f2e;--bdr:#242840;
  --txt:#dde1ed;--dim:#555c77;--acc:#f0a841;
  --scene:#4A9EFF;--singleton:#f0a841;--controller:#b47fff;
  --system:#4ecdc4;--data:#ff6b6b;--ui:#95e06c;
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.hdr h1{font-size:14px;font-weight:600}
.hdr-sep{color:var(--dim)}
.hdr-sub{color:var(--dim);font-size:12px}
.hdr-hint{margin-left:auto;font-size:11px;color:var(--dim);max-width:340px;line-height:1.4;text-align:right}
/* FILTER */
.filters{display:flex;align-items:center;gap:6px;padding:7px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.f-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-right:2px}
.f-btn{padding:3px 11px;border-radius:20px;border:1px solid var(--bdr);background:transparent;color:var(--dim);font-size:11px;cursor:pointer;transition:.15s;font-family:inherit}
.f-btn:hover{color:var(--txt);border-color:var(--dim)}
.f-btn.on{background:rgba(240,168,65,.1);border-color:var(--acc);color:var(--acc)}
/* BODY */
.body{display:flex;flex:1;overflow:hidden}
.diag{flex:1;overflow:auto;position:relative}
/* RIGHT PANEL */
.rp{width:288px;border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.rp-sec{padding:14px 16px;border-bottom:1px solid var(--bdr)}
.rp-hd{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);font-weight:600;margin-bottom:10px}
.flow-item{padding:9px 10px;border-radius:6px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:.15s}
.flow-item:hover{background:var(--surf2)}
.flow-item.on{background:rgba(240,168,65,.08);border-color:rgba(240,168,65,.3)}
.fi-title{font-size:12px;font-weight:500;margin-bottom:2px}
.flow-item.on .fi-title{color:var(--acc)}
.fi-desc{font-size:11px;color:var(--dim);line-height:1.4}
.steps-wrap{flex:1;overflow-y:auto;padding:14px 16px}
.step-item{display:flex;gap:9px;margin-bottom:12px;align-items:flex-start}
.step-n{flex-shrink:0;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;margin-top:2px}
.step-body .s-node{font-size:9px;color:var(--dim);font-family:monospace;margin-bottom:2px}
.step-body .s-text{font-size:11px;line-height:1.5;color:var(--txt)}
.steps-empty{font-size:11px;color:var(--dim);line-height:1.6;padding-top:4px}
/* TOOLTIP */
#tip{position:fixed;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:9px 12px;font-size:11px;max-width:260px;line-height:1.5;pointer-events:none;display:none;z-index:999}
#tip-title{font-weight:600;font-size:12px;margin-bottom:4px}
/* SVG ANIM */
@keyframes dash{to{stroke-dashoffset:-20}}
.e-active{animation:dash .5s linear infinite}
</style>
</head>

// ─── border intersection ──────────────────────────────────────────
function borderPt(cx,cy,tx,ty){
  const dx=tx-cx,dy=ty-cy,len=Math.sqrt(dx*dx+dy*dy);
  if(len<.001)return{x:cx,y:cy};
  const ndx=dx/len,ndy=dy/len;
  const hw=NW/2,hh=NH/2;
  const tx2=Math.abs(ndx)>1e-6?hw/Math.abs(ndx):1e9;
  const ty2=Math.abs(ndy)>1e-6?hh/Math.abs(ndy):1e9;
  const t=Math.min(tx2,ty2);
  return{x:cx+ndx*t,y:cy+ndy*t};
}

function edgePts(src,tgt){
  const sx=src.x+NW/2,sy=src.y+NH/2,tx=tgt.x+NW/2,ty=tgt.y+NH/2;
  const p1=borderPt(sx,sy,tx,ty);
  const p2=borderPt(tx,ty,sx,sy);
  return{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y};
}

function bezier(x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const d=Math.sqrt(dx*dx+dy*dy),b=Math.min(d*.38,90);
  let cx1,cy1,cx2,cy2;
  if(Math.abs(dy)>=Math.abs(dx)){
    cx1=x1;cy1=y1+(dy>0?b:-b);cx2=x2;cy2=y2-(dy>0?b:-b);
  }else{
    cx1=x1+(dx>0?b:-b);cy1=y1;cx2=x2-(dx>0?b:-b);cy2=y2;
  }
  return`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
}

function inFlow(edge,path){
  if(!path||!path.length)return false;
  const fi=path.indexOf(edge.from),ti=path.indexOf(edge.to);
  return fi!==-1&&ti!==-1&&fi<ti;
}

// ─── render diagram ───────────────────────────────────────────────
function render(){
  const svg=document.getElementById('svg');
  const maxX=Math.max(...DATA.nodes.map(n=>n.x))+NW+30;
  const maxY=Math.max(...DATA.nodes.map(n=>n.y))+NH+30;
  svg.setAttribute('viewBox',`0 0 ${maxX} ${maxY}`);
  svg.setAttribute('width',maxX);
  svg.setAttribute('height',maxY);
  svg.innerHTML='';

  const flow=DATA.flows.find(f=>f.id===activeFlow);
  const path=flow?flow.path:[];

  // defs
  const defs=e('defs');
  const mkMark=(id,col)=>{
    const m=e('marker');
    m.setAttribute('id',id);m.setAttribute('markerWidth','7');
    m.setAttribute('markerHeight','7');m.setAttribute('refX','6');
    m.setAttribute('refY','3');m.setAttribute('orient','auto');
    const p=e('path');p.setAttribute('d','M0,0 L0,6 L6,3 Z');
    p.setAttribute('fill',col);m.appendChild(p);defs.appendChild(m);
  };
  mkMark('arr','#2e3450');mkMark('arr-on','#f0a841');mkMark('arr-dim','#181c28');
  svg.appendChild(defs);

  // edges
  DATA.edges.forEach(edge=>{
    const src=nodeById(edge.from),tgt=nodeById(edge.to);
    if(!src||!tgt)return;
    const on=inFlow(edge,path);
    const dimmed=path.length>0&&!on;
    const{x1,y1,x2,y2}=edgePts(src,tgt);
    const p=e('path');
    p.setAttribute('d',bezier(x1,y1,x2,y2));
    p.setAttribute('fill','none');
    p.setAttribute('stroke',on?'#f0a841':(dimmed?'#181c28':'#2e3450'));
    p.setAttribute('stroke-width',on?2:1);
    p.setAttribute('opacity',dimmed?.15:1);
    if(on){p.setAttribute('stroke-dasharray','8 4');p.classList.add('e-active');}
    p.setAttribute('marker-end',`url(#${on?'arr-on':(dimmed?'arr-dim':'arr')})`);
    svg.appendChild(p);
  });

  // nodes
  DATA.nodes.forEach(node=>{
    const on=path.includes(node.id);
    const typeOk=activeTypes.size===0||activeTypes.has(node.type);
    const dimmed=(path.length>0&&!on)||!typeOk;
    const col=typeColor(node.type);
    const typeLbl=DATA.nodeTypes.find(t=>t.id===node.type)?.label||node.type;

    const g=e('g');
    g.setAttribute('transform',`translate(${node.x},${node.y})`);
    g.setAttribute('opacity',dimmed?.15:1);
    g.style.cursor='pointer';

    const rect=e('rect');
    rect.setAttribute('width',NW);rect.setAttribute('height',NH);
    rect.setAttribute('rx',5);rect.setAttribute('fill','#161b2b');
    rect.setAttribute('stroke',on?col:'#242840');
    rect.setAttribute('stroke-width',on?1.5:1);
    g.appendChild(rect);

    // accent bar
    const bar=e('rect');
    bar.setAttribute('x',0);bar.setAttribute('y',10);
    bar.setAttribute('width',3);bar.setAttribute('height',NH-20);
    bar.setAttribute('rx',1.5);bar.setAttribute('fill',col);
    g.appendChild(bar);

    // label
    const lbl=e('text');
    lbl.setAttribute('x',14);lbl.setAttribute('y',NH/2-3);
    lbl.setAttribute('fill','#dde1ed');lbl.setAttribute('font-size',10.5);
    lbl.setAttribute('font-weight','600');
    lbl.setAttribute('font-family','ui-monospace,"SF Mono",Consolas,monospace');
    lbl.setAttribute('dominant-baseline','auto');
    lbl.textContent=node.label;
    g.appendChild(lbl);

    // type badge
    const badge=e('text');
    badge.setAttribute('x',14);badge.setAttribute('y',NH/2+13);
    badge.setAttribute('fill',col);badge.setAttribute('font-size',9);
    badge.setAttribute('font-family','system-ui,sans-serif');
    badge.textContent=typeLbl;
    g.appendChild(badge);

    // hit area + tooltip
    const hit=e('rect');
    hit.setAttribute('width',NW);hit.setAttribute('height',NH);
    hit.setAttribute('fill','transparent');
    g.appendChild(hit);

    g.addEventListener('mouseenter',ev=>{
      document.getElementById('tip-title').textContent=node.label;
      document.getElementById('tip-body').textContent=node.description;
      document.getElementById('tip').style.display='block';
      moveTip(ev);
    });
    g.addEventListener('mousemove',moveTip);
    g.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';});
    svg.appendChild(g);
  });
}

function moveTip(ev){
  const t=document.getElementById('tip');
  let x=ev.clientX+14,y=ev.clientY+14;
  if(x+270>window.innerWidth)x=ev.clientX-280;
  if(y+130>window.innerHeight)y=ev.clientY-130;
  t.style.left=x+'px';t.style.top=y+'px';
}

// ─── flows panel ──────────────────────────────────────────────────
function buildFlows(){
  const list=document.getElementById('flow-list');
  list.innerHTML='';
  DATA.flows.forEach(fl=>{
    const d=document.createElement('div');
    d.className='flow-item'+(activeFlow===fl.id?' on':'');
    d.innerHTML=`<div class="fi-title">${fl.title}</div><div class="fi-desc">${fl.description}</div>`;
    d.addEventListener('click',()=>{
      activeFlow=activeFlow===fl.id?null:fl.id;
      buildFlows();buildSteps();render();
    });
    list.appendChild(d);
  });
}

function buildSteps(){
  const hd=document.getElementById('steps-hd');
  const list=document.getElementById('step-list');
  if(!activeFlow){
    hd.textContent='STEPS';
    list.innerHTML='<p class="steps-empty">좌측 FLOWS에서 항목을 선택하면<br>단계별 설명이 표시됩니다.</p>';
    return;
  }
  const fl=DATA.flows.find(f=>f.id===activeFlow);
  hd.textContent=`STEPS — ${fl.title}`;
  list.innerHTML='';
  fl.steps.forEach((step,i)=>{
    const node=nodeById(step.node);
    const col=node?typeColor(node.type):'#555';
    const d=document.createElement('div');
    d.className='step-item';
    d.innerHTML=`<div class="step-n" style="background:${col};border-color:${col}">${i+1}</div>
      <div class="step-body"><div class="s-node">${node?node.label:step.node}</div><div class="s-text">${step.text}</div></div>`;
    list.appendChild(d);
  });
}

// ─── filters ─────────────────────────────────────────────────────
function buildFilters(){
  const bar=document.getElementById('filters');
  const allBtn=document.createElement('button');
  allBtn.className='f-btn on';allBtn.textContent='전체';
  allBtn.addEventListener('click',()=>{
    activeTypes.clear();
    bar.querySelectorAll('.f-btn').forEach(b=>{b.classList.remove('on');b.style.cssText='';});
    allBtn.classList.add('on');render();
  });
  bar.appendChild(allBtn);

  DATA.nodeTypes.forEach(nt=>{
    const btn=document.createElement('button');
    btn.className='f-btn';btn.textContent=nt.label;
    btn.addEventListener('click',()=>{
      allBtn.classList.remove('on');
      if(activeTypes.has(nt.id)){
        activeTypes.delete(nt.id);
        btn.classList.remove('on');btn.style.cssText='';
      }else{
        activeTypes.add(nt.id);
        btn.classList.add('on');
        btn.style.borderColor=nt.color;btn.style.color=nt.color;
        btn.style.background=nt.color+'18';
      }
      if(!activeTypes.size)allBtn.classList.add('on');
      render();
    });
    bar.appendChild(btn);
  });
}

buildFilters();buildFlows();buildSteps();render();
</script>
</body>
